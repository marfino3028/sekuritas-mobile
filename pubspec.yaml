name: sekuritas_demo
description: Demo mutual fund investment platform mobile app
publish_to: 'none'
version: 2.1.12+222

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Network
  dio: ^5.4.3
  pretty_dio_logger: ^1.3.1

  # Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # UI
  pinput: ^3.0.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  flutter_svg: ^2.0.10+1

  # Charts
  fl_chart: ^0.68.0

  # Image
  image_picker: ^1.1.2
  permission_handler: ^11.3.1

  # Utilities
  intl: ^0.19.0
  equatable: ^2.0.5
  dartz: ^0.10.1

  # Code generation annotations
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Icons
  cupertino_icons: ^1.0.6
  material_design_icons_flutter: ^7.0.7296

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
